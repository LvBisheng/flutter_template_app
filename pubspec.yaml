name: flutter_enterprise_starter
description: Flutter Enterprise Starter App for customer profile management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_riverpod: ^3.0.3
  flutter_secure_storage: ^9.2.4
  freezed_annotation: ^3.1.0
  go_router: ^17.0.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  riverpod_annotation: ^3.0.3
  shared_preferences: ^2.5.3
  talker_flutter: ^5.1.16
  talker_dio_logger: ^5.1.17

dev_dependencies:
  build_runner: ^2.10.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
